name: Deploy example docker image

on:
  workflow_dispatch:

  pull_request:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  deploy_example_docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the Docker image
        run: |
            docker build -f examples/Dockerfile -t ghcr.io/nunoya-yuma/blabot/example-app:latest \
            -t ghcr.io/nunoya-yuma/blabot/example-app:0.0.2 ./
      - name: Push the latest docker image
        run: |
            docker push ghcr.io/nunoya-yuma/blabot/example-app:0.0.2
            docker push ghcr.io/nunoya-yuma/blabot/example-app:latest
